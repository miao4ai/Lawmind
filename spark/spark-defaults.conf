# Spark configuration for the local Lawmind cluster.
# This file is picked up automatically when spark-submit runs inside the container
# (placed at $SPARK_HOME/conf/spark-defaults.conf via volume mount — see docker-compose).

# ── Cluster ──────────────────────────────────────────────────────────────────
spark.master                            spark://spark-master:7077

# ── Memory & Cores ───────────────────────────────────────────────────────────
spark.driver.memory                     2g
spark.executor.memory                   3g
spark.executor.cores                    2

# ── Python ───────────────────────────────────────────────────────────────────
# Workers need PYTHONPATH so they can import tools/, shared/, etc.
spark.executorEnv.PYTHONPATH            /app
spark.yarn.appMasterEnv.PYTHONPATH      /app

# ── Parallelism ───────────────────────────────────────────────────────────────
# Keep shuffle partitions low for local cluster (2 workers × 2 cores = 4 slots)
spark.sql.shuffle.partitions            8
spark.default.parallelism               4

# ── UI ───────────────────────────────────────────────────────────────────────
spark.ui.enabled                        true
spark.ui.port                           4040

# ── Logging ──────────────────────────────────────────────────────────────────
spark.eventLog.enabled                  false
