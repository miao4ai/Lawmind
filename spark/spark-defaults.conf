# Spark configuration for the local Lawmind cluster.
# Mounted into all containers at $SPARK_HOME/conf/spark-defaults.conf

# ── Cluster ───────────────────────────────────────────────────────────────────
spark.master                                    spark://spark-master:7077

# ── Memory & Cores ────────────────────────────────────────────────────────────
spark.driver.memory                             2g
spark.executor.memory                           3g
spark.executor.cores                            2

# ── Python ────────────────────────────────────────────────────────────────────
spark.executorEnv.PYTHONPATH                    /app
spark.yarn.appMasterEnv.PYTHONPATH              /app

# ── Parallelism ───────────────────────────────────────────────────────────────
spark.sql.shuffle.partitions                    8
spark.default.parallelism                       4

# ── GCS Connector ─────────────────────────────────────────────────────────────
# Tells Spark which FileSystem implementation handles gs:// URIs.
# The JAR is baked into the image at /opt/bitnami/spark/jars/.
spark.hadoop.fs.gs.impl                         com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
spark.hadoop.fs.AbstractFileSystem.gs.impl      com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS

# ── GCS Authentication ────────────────────────────────────────────────────────
# Service Account Key (local Spark → GCS).
# GOOGLE_APPLICATION_CREDENTIALS env var is set in docker-compose.yml.
# The connector reads it automatically when the line below is set to false
# (meaning: do NOT use the metadata server, instead use the key file).
spark.hadoop.google.cloud.auth.service.account.enable   true
spark.hadoop.google.cloud.auth.type                     SERVICE_ACCOUNT_JSON_KEYFILE
# Path to the key file inside every container (mounted via docker-compose volume).
spark.hadoop.google.cloud.auth.service.account.json.keyfile  /app/credentials/service-account.json

# When running on GKE (Workload Identity), comment out the two lines above and
# uncomment the line below — pods inherit the GCP identity from their K8s SA:
# spark.hadoop.google.cloud.auth.type                   APPLICATION_DEFAULT

# ── GCS I/O tuning ────────────────────────────────────────────────────────────
# Number of bytes to request per GCS read call (default 64MB is fine locally).
spark.hadoop.fs.gs.io.buffersize                        8388608

# ── UI ────────────────────────────────────────────────────────────────────────
spark.ui.enabled                                true
spark.ui.port                                   4040

# ── Logging ───────────────────────────────────────────────────────────────────
spark.eventLog.enabled                          false
